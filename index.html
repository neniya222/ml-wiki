<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Official Wiki</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            /* --- 背景設定（ここを変えると後ろが変わります） --- */
            --fandom-bg: #191919; 
            /* 背景を画像にしたい場合は body の background-image を使ってください */

            --at-wiki-content-bg: #ffffff;
            --fandom-blue: #00d6d6;
            --sidebar-width: 280px;
            --header-height: 60px;
        }

        body {
            margin: 0; font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--fandom-bg);
            /* background-image: url('画像のURL'); background-attachment: fixed; background-size: cover; */
            color: #333; overflow-x: hidden;
        }

        /* ヘッダー */
        header {
            height: var(--header-height); background: #2a2f35; color: white;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; position: sticky; top: 0; z-index: 2000;
            border-bottom: 3px solid var(--fandom-blue);
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--fandom-blue); text-decoration: none; font-size: 1.1em; }

        /* ハンバーガーボタン（初期は非表示） */
        #menu-toggle {
            display: none; background: none; border: none; color: white; cursor: pointer; padding: 5px;
        }

        /* 検索 */
        .search-container { position: relative; width: 250px; }
        .search-box {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #444;
            border-radius: 4px; padding: 7px 10px 7px 35px; color: white; outline: none; font-size: 14px;
        }
        #search-results {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: white; box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            border-radius: 0 0 4px 4px; display: none; z-index: 1001;
        }
        .search-item { padding: 12px; border-bottom: 1px solid #eee; text-decoration: none; color: #333; display: block; font-size: 13px; }
        .no-result { padding: 12px; color: #999; text-align: center; font-size: 12px; }

        /* レイアウト */
        .wrapper { display: flex; max-width: 1440px; margin: 0 auto; position: relative; }

        /* サイドバー */
        nav {
            width: var(--sidebar-width); background: #fff; padding: 20px;
            border-right: 1px solid #ddd; flex-shrink: 0; display: flex; flex-direction: column;
            transition: transform 0.3s ease;
        }
        .nav-content { flex-grow: 1; }
        nav h3 { font-size: 0.8em; color: #888; border-bottom: 1px solid #eee; margin: 25px 0 10px 0; display: flex; align-items: center; gap: 6px; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li a { text-decoration: none; color: #0066c0; display: block; padding: 8px 10px; font-size: 0.9em; }

        /* 広告枠 */
        .ad-space { margin-top: 30px; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
        .ad-label { font-size: 10px; color: #bbb; margin-bottom: 10px; display: block; }

        /* メインコンテンツ */
        main { flex: 1; background: var(--at-wiki-content-bg); padding: 40px; min-width: 0; min-height: 100vh; }
        #wiki-view h1 { font-size: 2.2em; border-bottom: 4px solid #333; padding-bottom: 10px; margin-top: 0; }
        #wiki-view h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 35px; border-left: 8px solid var(--fandom-blue); padding-left: 15px; }

        /* スマホ対応のスタイル切り替え */
        @media (max-width: 900px) {
            #menu-toggle { display: block; } /* 三本線を表示 */
            
            nav {
                position: fixed; top: var(--header-height); left: 0;
                height: calc(100vh - var(--header-height));
                z-index: 1500; transform: translateX(-100%); /* 画面外に隠す */
                box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            }
            nav.open { transform: translateX(0); } /* スライドして表示 */

            main { padding: 20px; }
            .search-container { width: 150px; }
        }

        /* 画面が暗くなるオーバーレイ */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1400;
        }
        #overlay.show { display: block; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button id="menu-toggle">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <a href="#home" class="logo">
            <span class="material-symbols-outlined">shield</span>
            <span>SERVER WIKI</span>
        </a>
    </div>
    
    <div class="search-container">
        <span class="material-symbols-outlined" style="position:absolute; left:8px; top:50%; transform:translateY(-50%); color:#888; font-size:1.2rem;">search</span>
        <input type="text" id="search-input" class="search-box" placeholder="検索...">
        <div id="search-results"></div>
    </div>
</header>

<div id="overlay"></div>

<div class="wrapper">
    <nav id="sidebar">
        <div id="sidebar-nav" class="nav-content">
            <p>Loading...</p>
        </div>

        <div class="ad-space">
            <span class="ad-label">ADVERTISEMENT</span>
            <script src="https://adm.shinobi.jp/o/c68c880288e59ed7ade0e94d250be6c9"></script>
            </div>
    </nav>

    <main>
        <article id="wiki-view">
            <p>読み込み中...</p>
        </article>
    </main>
</div>

<script>
    let wikiIndex = [];
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuToggle = document.getElementById('menu-toggle');

    // スマホメニューの開閉
    function toggleMenu() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    }

    menuToggle.onclick = toggleMenu;
    overlay.onclick = toggleMenu;

    async function initWiki() {
        try {
            const resIndex = await fetch('./wikipageslist.json');
            wikiIndex = await resIndex.json();
            const resMenu = await fetch('./sidemenu.json');
            const menuData = await resMenu.json();
            
            const navContent = document.getElementById('sidebar-nav');
            navContent.innerHTML = ''; 
            menuData.forEach(section => {
                const h3 = document.createElement('h3');
                h3.innerHTML = `<span class="material-symbols-outlined">list_alt</span> ${section.category}`;
                navContent.appendChild(h3);
                const ul = document.createElement('ul');
                section.links.forEach(link => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="#${link.id}">${link.text}</a>`;
                    li.onclick = () => { if(window.innerWidth <= 900) toggleMenu(); };
                    ul.appendChild(li);
                });
                navContent.appendChild(ul);
            });
            updateContent(); 
        } catch (e) { updateContent(); }
    }

    async function updateContent() {
        const view = document.getElementById('wiki-view');
        const hash = window.location.hash.replace('#', '') || 'home';
        
        try {
            const response = await fetch(`./pages/${hash}.md`);
            if (!response.ok) throw new Error();
            let text = await response.text();

            if (text.startsWith("TITLE:")) {
                const firstLine = text.split('\n')[0];
                document.title = firstLine.replace("TITLE:", "").trim();
                text = text.replace(firstLine, "").trim();
            }

            view.innerHTML = marked.parse(text);
            document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            window.scrollTo(0, 0);
        } catch (e) {
            view.innerHTML = `<h1>404</h1><p>見つかりません</p>`;
        }
    }

    const sInput = document.getElementById('search-input');
    const sResults = document.getElementById('search-results');
    sInput.oninput = () => {
        const val = sInput.value.toLowerCase();
        sResults.innerHTML = '';
        if(!val) { sResults.style.display='none'; return; }
        const matches = wikiIndex.filter(i => i.title.toLowerCase().includes(val) || (i.tags && i.tags.toLowerCase().includes(val)));
        if (matches.length > 0) {
            matches.forEach(m => {
                const a = document.createElement('a');
                a.href = `#${m.id}`; a.className = 'search-item'; a.innerText = m.title;
                a.onclick = () => { sResults.style.display='none'; sInput.value=''; if(window.innerWidth <= 900) toggleMenu(); };
                sResults.appendChild(a);
            });
        } else {
            const div = document.createElement('div'); div.className = 'no-result'; div.innerText = '該当なし';
            sResults.appendChild(div);
        }
        sResults.style.display = 'block';
    };

    window.onhashchange = updateContent;
    window.onload = initWiki;
</script>
</body>
</html>
