<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Wiki</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* --- デザイン設定 --- */
        :root {
            --sidebar-width: 240px;
            --fandom-blue: #00d6d6;
            --at-wiki-bg: #f0f2f5;
            --header-bg: #1e2328;
            --link-color: #0066c0;
        }

        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            display: flex;
            flex-direction: column;
            background-color: var(--at-wiki-bg);
            color: #333;
        }

        /* ヘッダー */
        header {
            height: 50px;
            background: var(--header-bg);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            min-height: calc(100vh - 50px);
        }

        /* サイドバー (アットウィキ風) */
        nav {
            width: var(--sidebar-width);
            background: #fff;
            padding: 20px;
            border-right: 1px solid #ccc;
            flex-shrink: 0;
        }

        nav h3 { 
            font-size: 0.95em; 
            border-left: 5px solid var(--fandom-blue); 
            padding-left: 10px; 
            margin-top: 25px;
            color: #555;
        }
        
        nav ul { list-style: none; padding: 0; margin: 10px 0; }
        nav li a { 
            text-decoration: none; 
            color: var(--link-color); 
            display: block; 
            padding: 6px 0; 
            border-bottom: 1px dashed #eee;
            font-size: 0.9em;
        }
        nav li a:hover { background-color: #f9f9f9; padding-left: 4px; transition: 0.2s; }

        /* メインエリア (Fandom風) */
        main {
            flex: 1;
            background: #fff;
            margin: 20px;
            padding: 40px;
            border: 1px solid #ddd;
            border-radius: 2px;
            line-height: 1.7;
            min-width: 0;
        }

        /* Markdown表示のカスタマイズ */
        #wiki-view h1 { border-bottom: 3px solid var(--fandom-blue); padding-bottom: 8px; margin-top: 0; font-size: 2em; }
        #wiki-view h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 1.5em; }
        #wiki-view blockquote { border-left: 4px solid #ccc; padding-left: 15px; color: #666; font-style: italic; margin: 1em 0; }
        
        /* コードブロック */
        pre { background: #1e1e1e; padding: 15px; border-radius: 5px; overflow-x: auto; }
        code { font-family: 'Consolas', 'Monaco', monospace; background: #f4f4f4; padding: 2px 4px; border-radius: 3px; color: #e83e8c; }
        pre code { background: none; color: inherit; padding: 0; }

        /* エラー画面のデザイン */
        .error-container { text-align: center; padding: 60px 20px; }
        .error-container i { font-size: 5rem; color: #ffcc00; margin-bottom: 20px; }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            nav { width: 100%; border-right: none; box-sizing: border-box; }
            main { margin: 10px; padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.2em;">
        <i class="fas fa-database"></i> Server Wiki
    </div>
</header>

<div class="container">
    <nav>
        <h3>メインメニュー</h3>
        <ul>
            <li><a href="#home"><i class="fas fa-home"></i> ホーム</a></li>
            <li><a href="#rules"><i class="fas fa-gavel"></i> サーバー規約</a></li>
            <li><a href="#commands"><i class="fas fa-code"></i> コマンド一覧</a></li>
        </ul>
        <h3>データベース</h3>
        <ul>
            <li><a href="#items"><i class="fas fa-sword"></i> アイテム一覧</a></li>
            <li><a href="#world"><i class="fas fa-map-marked-alt"></i> ワールド紹介</a></li>
        </ul>
    </nav>

    <main id="wiki-view">
        <p><i class="fas fa-spinner fa-spin"></i> 準備中...</p>
    </main>
</div>

<script>
    async function updateContent() {
        const view = document.getElementById('wiki-view');
        const rawHash = window.location.hash.replace('#', '');
        const hash = rawHash || 'home';
        
        view.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> ページを読み込み中...</p>';

        try {
            // ファイルを取得
            const response = await fetch(`./pages/${hash}.md`);

            // ステータスチェック (404対策)
            if (!response.ok) {
                throw new Error('NOT_FOUND');
            }

            // コンテンツタイプ確認 (HTMLが返ってきたらエラーにする)
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.includes("text/html")) {
                throw new Error('FILE_IS_HTML_NOT_MD');
            }

            const md = await response.text();

            // 念のため中身がHTMLタグで始まっていないか最終チェック
            if (md.trim().startsWith('<!DOCTYPE') || md.trim().startsWith('<html')) {
                throw new Error('INVALID_CONTENT');
            }

            // MarkdownをHTMLに変換
            view.innerHTML = marked.parse(md);
            
            // コードハイライト適用
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            
            // ページ最上部へ
            window.scrollTo(0, 0);

        } catch (e) {
            // エラー時の表示
            console.error("Wiki Error:", e.message);
            view.innerHTML = `
                <div class="error-container">
                    <i class="fas fa-question-circle"></i>
                    <h1>404 Not Found</h1>
                    <p>申し訳ありません。お探しのページ「<strong>${hash}</strong>」は見つかりませんでした。</p>
                    <p style="color: #999; font-size: 0.8em;">(Reason: ${e.message})</p>
                    <br>
                    <a href="#home" style="color: var(--fandom-blue); text-decoration: none;">
                        <i class="fas fa-chevron-left"></i> ホームへ戻る
                    </a>
                </div>
            `;
        }
    }

    // イベントリスナー
    window.addEventListener('hashchange', updateContent);
    window.addEventListener('DOMContentLoaded', updateContent);
</script>

</body>
</html>
